<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scientific Plots</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  />

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-light p-4">
  <div class="container">
    <h1 class="mb-4">Scientific Results</h1>

    <div class="mb-3">
      <label for="plotSelector" class="form-label">Choose a plot:</label>
      <select class="form-select" id="plotSelector" onchange="updatePlot()">
        <option value="plot1">Accuracy Over Time</option>
        <option value="plot2">Loss Comparison</option>
      </select>
    </div>

    <div id="plot" class="border rounded p-3 bg-white shadow-sm"></div>
  </div>

  <!-- Bootstrap JS Bundle (includes Popper) -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <script>
    function updatePlot() {
      const selected = document.getElementById('plotSelector').value;
      if (selected === 'plot1') {
        Plotly.newPlot('plot', [{ x: [1, 2, 3], y: [10, 15, 13] }], { title: 'Accuracy Over Time' });
      } else if (selected === 'plot2') {
        Plotly.newPlot('plot', [{ x: [1, 2, 3], y: [20, 14, 23] }], { title: 'Loss Comparison' });
      }
    }

    updatePlot(); // run on load
  </script>
</body>
</html>
